<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="7" y="8" width="18" height="20" rx="3" fill="white"/>
  <!-- Clipboard clip -->
  <rect x="11" y="5" width="10" height="5" rx="2" fill="white"/>
  <rect x="13" y="4" width="6" height="3" rx="1.5" fill="url(#bg)"/>
  <!-- Checkboxes -->
  <rect x="10" y="13" width="4" height="4" rx="1" fill="#22c55e"/>
  <polyline points="11,15.2 12,16.2 13.5,14" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="10" y="19" width="4" height="4" rx="1" fill="#22c55e"/>
  <polyline points="11,21.2 12,22.2 13.5,20" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Task lines -->
  <line x1="16" y1="15" x2="22" y2="15" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="22" y2="21" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Star burst accent -->
  <circle cx="25" cy="7" r="4" fill="#fbbf24"/>
  <text x="25" y="9.5" text-anchor="middle" font-size="7" font-weight="bold" fill="white">!</text>
</svg>
